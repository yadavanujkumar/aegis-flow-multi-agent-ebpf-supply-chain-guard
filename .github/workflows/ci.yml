name: Aegis-Flow CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  # ── Orchestrator: lint, build, test ─────────────────────────────────────────
  orchestrator-test:
    name: Orchestrator – Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint "src/**/*.ts" --max-warnings=0

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Audit dependencies
        run: npm audit --audit-level=high

  # ── eBPF Agent: Rust build ────────────────────────────────────────────────
  ebpf-agent-build:
    name: eBPF Agent – Rust Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            ebpf-agent/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('ebpf-agent/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install bpf-linker
        run: cargo install bpf-linker --locked

      - name: Build eBPF Agent
        working-directory: ./ebpf-agent
        run: cargo build --release

      - name: Cargo audit (dependency vulnerabilities)
        working-directory: ./ebpf-agent
        run: |
          cargo install cargo-audit --locked
          cargo audit

  # ── Container image scan ────────────────────────────────────────────────────
  container-scan:
    name: Container Image – Trivy Scan
    runs-on: ubuntu-latest
    needs: orchestrator-test
    steps:
      - uses: actions/checkout@v4

      - name: Build orchestrator image
        run: docker build -f Dockerfile.orchestrator -t aegis-flow-orchestrator:scan .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: aegis-flow-orchestrator:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
